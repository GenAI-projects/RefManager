<!doctype html>
<html><head><meta charset="UTF-8"/><title>RefManager Setup</title><link rel="stylesheet" href="styles.css"/></head>
<body><main>
<h1>RefManager: Google Workspace Setup</h1>
<p>Sign in to Google and verify Drive permissions before using automatic sync.</p>
<label>Google OAuth Client ID <input id="client-id" style="width:100%" placeholder="YOUR_CLIENT_ID.apps.googleusercontent.com"/></label>
<p><strong>Authorized redirect URI to add in Google Cloud:</strong><br/><code id="redirect-uri"></code></p>
<div class="toolbar">
  <button id="save-client">Save Client ID</button>
  <button id="login">Login to Google</button>
  <button id="check">Run Drive Permission Check</button>
  <button id="open-popup">Open Quick Actions</button>
  <button id="open-policy">Data Protection Agreement</button>
</div>
<pre id="status">Not signed in.</pre>
</main><script src="landing.js"></script></body></html>
