<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RefManager Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Your Library</h1>
    <div class="toolbar">
      <button id="refresh">Refresh</button>
      <button id="clear">Clear Library</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>DOI</th>
          <th>Title</th>
          <th>Authors</th>
          <th>Year</th>
          <th>Journal</th>
        </tr>
      </thead>
      <tbody id="library-body"></tbody>
    </table>
  </main>
  <script src="options.js"></script>
</body>
</html>
