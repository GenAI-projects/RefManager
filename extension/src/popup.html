<!doctype html><html><head><meta charset="UTF-8" /><title>RefManager</title><link rel="stylesheet" href="styles.css" /></head><body><main><h1>RefManager</h1><p id="linked-doc" class="muted">No doc linked yet.</p><label for="manual-doc-id">Manual Google Doc ID (fallback)</label><input id="manual-doc-id" placeholder="Paste doc id from docs.google.com/document/d/<DOC_ID>/..." /><div class="toolbar"><button id="link-current" type="button">Link Current Google Doc</button><button id="link-manual" type="button">Link Manual Doc ID</button><button id="convert-current" type="button">Convert Tokens</button></div><form id="id-form"><label for="mode">Type</label><select id="mode" name="mode"><option value="doi">DOI</option><option value="pmid">PMID</option></select><input id="value" name="value" placeholder="10.1038/... or 12345678" required /><button type="submit">Add Reference</button></form><p id="status" aria-live="polite"></p><button id="open-library" type="button">Open Library & Sync</button></main><script src="popup.js"></script></body></html>
